<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio01</title>
</head>
<body>
    <h1>Você é brasileiro ou estrangeiro?</h1>
    <input type="text" id="naci">
    <input type="button" value="verificar" onclick="verificar()">
    <div id="resposta"></div>

    <script>
        function verificar() {
            let nacionalidade = document.querySelector('input#naci');
            nacionalidade = String(nacionalidade.value);
            let resposta = document.querySelector('div#resposta');
            if(nacionalidade.toLowerCase() == "brasil"){
                resposta.innerHTML = "<p>Você é brasileiro!</p>";
            }else{
                resposta.innerHTML = "<p>Você é estrangeiro!</p>";
            }
        }
    </script>
</body>
</html>
