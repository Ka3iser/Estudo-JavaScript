<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>modelo</title>
</head>
<body>
    <header id="title">
        <h1>Contagem</h1>
    </header>

    <section>
        <div id="form">
            <label for="inicio">Inicio: </label>
            <input type="number" id="inicio">
            <br>
            <label for="fim">Fim:</label>
            <input type="number" id="fim">
            <br>
            <label for="passo">Passo:</label>
            <input type="number" id="passo">
            <br>
            <input type="button" value="contar" onclick="contar()" id="botao">
            <br>
            
        </div>
        <div id="resultado">
            <p>preparando a contagem...</p>
        </div>
    </section>
    
    <footer>
        <p>&copy; Henrique Ribeiro</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
