<body>
    <header id="title">
        <h1>Verificador de idade</h1>
    </header>

    <section>
        <div id="formulario">    
            <label for="idade">Ano de nascimento </label>
            <input type="number" name="idade" id="nascimento">
            <br>
            <label for="sexo">Sexo: </label>
            <input type="radio" name="sexo" id="femino">
            <label for="feminino">Feminino</label>
            <input type="radio" name="sexo" id="masculino" >
            <label for="masculino">Masculino</label>
            <br>
            <input type="button" value="Verificar" id="button" onclick="verificar()">
            <br>
            <div id="resultado">
                <br>
                <p>Preencha os dados acima para ver o resultado!</p>
                
            </div>
        </div>
    </section>
    
    <footer>

    </footer>
